name: Auto Build and Release Morphe

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: "Rebuild every app (ignore incremental check)"
        type: boolean
        required: false
        default: false
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC

jobs:
  download-tools:
    name: Download Morphe Tools
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.cache-key }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
        
      - name: Download Morphe Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          curl -L "https://github.com/revanced/revanced-cli/releases/latest/download/revanced-cli-all.jar" -o tools/revanced-cli.jar
          curl -L "https://github.com/revanced/revanced-patches/releases/latest/download/patches.jar" -o tools/patches.jar
          curl -L "https://github.com/revanced/revanced-integrations/releases/latest/download/app-release-unsigned.apk" -o tools/integrations.apk
        
      - name: Cache Tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: tools/
          key: revanced-tools-${{ hashFiles('patch-config.json', 'arch-config.json') }}
        
      - name: Generate Cache Key
        id: cache-key
        run: echo "cache-key=${{ steps.cache-tools.outputs.cache-key || 'no-cache' }}" >> $GITHUB_OUTPUT

  check-updates:
    name: Check for Updates
    needs: download-tools
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      build_matrix: ${{ steps.check.outputs.build_matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Run Incremental Update Check
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_FULL_REBUILD: ${{ inputs.force_full_rebuild || 'false' }}
        run: |
          python scripts/check_app_updates.py

  patch-apps:
    name: Read Configuration
    needs: [check-updates, download-tools]
    runs-on: ubuntu-latest
    if: needs.check-updates.outputs.has_updates == 'true'
    outputs:
      matrix: ${{ steps.read-matrix.outputs.matrix }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Use Build Matrix from Check
        id: read-matrix
        run: |
          MATRIX='${{ needs.check-updates.outputs.build_matrix }}'
          if [ -z "$MATRIX" ] || [ "$MATRIX" = "null" ]; then
            MATRIX=$(jq -c '.patch_list' patch-config.json)
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-apps:
    name: Build and Release Applications
    needs: patch-apps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.patch-apps.outputs.matrix) }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Cached Tools
        uses: actions/cache@v4
        with:
          path: tools/
          key: revanced-tools-${{ hashFiles('patch-config.json', 'arch-config.json') }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests beautifulsoup4

      - name: Setup Custom Signing Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > /tmp/custom.keystore

      - name: Execute Morphe Auto Build Pipeline
        env:
          APP_NAME: ${{ matrix.app_name }}
          SOURCE: ${{ matrix.source }}
          KS_PATH: "/tmp/custom.keystore"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m src

  cleanup:
    name: Cleanup Workflow Runs
    needs: build-apps
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: write
    steps:
      - name: Delete Old Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          retain_days: 3
          keep_minimum_runs: 5